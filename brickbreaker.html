<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BREAKOUT — Sunset Arcade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #1a0a2e;
  --hot:      #ff3864;
  --gold:     #ffd166;
  --teal:     #06d6a0;
  --lavender: #c77dff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  user-select: none;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse 120% 80% at 50% 110%,
    #ff6b35 0%, #c9184a 25%, #560bad 55%, #1a0a2e 80%);
  z-index:0;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, white, transparent),
    radial-gradient(1px 1px at 30% 8%,  white, transparent),
    radial-gradient(1px 1px at 55% 20%, white, transparent),
    radial-gradient(1px 1px at 78% 5%,  white, transparent),
    radial-gradient(1px 1px at 90% 25%, white, transparent),
    radial-gradient(1px 1px at 20% 35%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 65% 12%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 42% 3%,  rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.4), transparent);
  z-index:0;
}

#wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

h1 {
  font-size: clamp(14px, 3vw, 22px);
  color: var(--gold);
  text-shadow:
    0 0 10px rgba(255,209,102,0.9),
    0 0 30px rgba(255,56,100,0.6),
    3px 3px 0 rgba(0,0,0,0.5);
  letter-spacing: 0.12em;
}

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,209,102,0.45);
  letter-spacing: 0.35em;
  margin-top: 6px;
  text-transform: uppercase;
  text-align: center;
}

.hud {
  display: flex;
  gap: 32px;
  font-size: 10px;
  color: var(--gold);
}
.hud-cell { display:flex; flex-direction:column; align-items:center; gap:4px; }
.hud-label { color: rgba(255,209,102,0.4); font-size:7px; letter-spacing:.25em; }
.hud-val { font-size: 13px; text-shadow: 0 0 10px var(--gold); }

.arena {
  position: relative;
  border: 2px solid rgba(255,209,102,0.3);
  box-shadow:
    0 0 0 1px rgba(255,56,100,0.15),
    0 0 40px rgba(199,125,255,0.2),
    inset 0 0 60px rgba(0,0,0,0.4);
}

canvas { display: block; }

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: rgba(10,4,26,0.82);
  backdrop-filter: blur(6px);
}

.overlay-title {
  font-size: clamp(13px, 2.5vw, 18px);
  color: var(--gold);
  text-shadow: 0 0 16px var(--gold), 0 0 40px #ff6b35;
  text-align: center;
  line-height: 1.8;
}

.overlay-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.3em;
  text-align: center;
}

.overlay-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 12px 28px;
  background: transparent;
  border: 2px solid var(--hot);
  color: var(--hot);
  cursor: pointer;
  letter-spacing: 0.15em;
  text-shadow: 0 0 8px var(--hot);
  box-shadow: 0 0 16px rgba(255,56,100,0.4);
  transition: all .2s;
}
.overlay-btn:hover {
  background: var(--hot);
  color: white;
  box-shadow: 0 0 30px rgba(255,56,100,0.8);
}

.hint {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.3em;
}
</style>
</head>
<body>
<div id="wrapper">
  <header style="text-align:center">
    <h1>★ BREAKOUT ★</h1>
    <p class="tagline">sunset arcade edition</p>
  </header>

  <div class="hud">
    <div class="hud-cell">
      <span class="hud-label">score</span>
      <span class="hud-val" id="scoreEl">0</span>
    </div>
    <div class="hud-cell">
      <span class="hud-label">lives</span>
      <span class="hud-val" id="livesEl">♥ ♥ ♥</span>
    </div>
    <div class="hud-cell">
      <span class="hud-label">level</span>
      <span class="hud-val" id="levelEl">1</span>
    </div>
  </div>

  <div class="arena" id="arena">
    <canvas id="c"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="ovTitle">★ BREAKOUT ★</div>
      <div class="overlay-sub" id="ovSub">move mouse · click to launch</div>
      <button class="overlay-btn" id="ovBtn" onclick="startGame()">INSERT COIN</button>
    </div>
  </div>

  <p class="hint">mouse to move &nbsp;·&nbsp; click / space to launch</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CW = Math.min(480, window.innerWidth - 24);
const CH = Math.round(CW * 1.35);
canvas.width = CW;
canvas.height = CH;

const COLS = 9, ROWS = 7, PAD_GAP = 5, BRICK_TOP = 55;

const PALETTE = [
  ['#ff3864','#ff6b8a'],
  ['#ff6b35','#ffaa80'],
  ['#ffd166','#ffe8a1'],
  ['#06d6a0','#80ffe8'],
  ['#0096ff','#80ccff'],
  ['#c77dff','#e5b8ff'],
  ['#ff3864','#ff6b8a'],
];

let score=0, lives=3, level=1, gameState='idle';
let bricks=[], particles=[], flashFrames=0;
let ball={x:0,y:0,dx:0,dy:0,r:7,trail:[],live:false};
let pad={x:0,y:0,w:0,h:10};
let mouseX=CW/2;
let rafId=null;

function bw() { return (CW - PAD_GAP*(COLS+1)) / COLS; }
function bh() { return 16; }
function spd() { return 3.5 + level*0.55; }

function initBricks() {
  bricks=[];
  const W=bw(), H=bh();
  for(let r=0;r<ROWS;r++){
    const hp = r<2 ? 2 : 1;
    for(let c=0;c<COLS;c++){
      bricks.push({
        x: PAD_GAP + c*(W+PAD_GAP),
        y: BRICK_TOP + r*(H+PAD_GAP),
        w:W, h:H, hp, maxHp:hp,
        cols: PALETTE[r%PALETTE.length],
        alive:true
      });
    }
  }
}

function initPad() {
  pad.w = CW*0.20;
  pad.y = CH-40;
  pad.x = CW/2 - pad.w/2;
}

function initBall() {
  ball.x = pad.x + pad.w/2;
  ball.y = pad.y - ball.r - 2;
  const s = spd();
  ball.dx = s*(Math.random()>.5?1:-1);
  ball.dy = -s;
  ball.live = false;
  ball.trail = [];
}

function resetRound() { initPad(); initBall(); }

function updateHUD() {
  document.getElementById('scoreEl').textContent = score;
  const h = ['♥ ♥ ♥','♥ ♥ ♡','♥ ♡ ♡','♡ ♡ ♡'];
  document.getElementById('livesEl').textContent = h[Math.max(0,3-lives)];
  document.getElementById('levelEl').textContent = level;
}

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX - canvas.getBoundingClientRect().left;
});
canvas.addEventListener('click', () => { if(gameState==='playing') ball.live=true; });
window.addEventListener('keydown', e => {
  if((e.key===' '||e.key==='ArrowUp') && gameState==='playing'){ ball.live=true; e.preventDefault(); }
});

function showOverlay(title, sub, btn) {
  document.getElementById('ovTitle').innerHTML = title;
  document.getElementById('ovSub').textContent = sub;
  document.getElementById('ovBtn').textContent = btn;
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('ovBtn').onclick = startGame;
}

function startGame() {
  score=0; lives=3; level=1;
  initBricks(); resetRound(); updateHUD();
  document.getElementById('overlay').style.display = 'none';
  gameState = 'playing';
  if(rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function burst(x, y, col) {
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*4;
    particles.push({
      x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,
      r:2+Math.random()*3,col,life:1,
      dec:0.03+Math.random()*0.04
    });
  }
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function draw() {
  // bg
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#08011a'); g.addColorStop(0.6,'#1a0a2e'); g.addColorStop(1,'#3d0f3d');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  const hg=ctx.createRadialGradient(CW/2,CH,0,CW/2,CH,CW*0.9);
  hg.addColorStop(0,'rgba(255,107,53,0.18)'); hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg; ctx.fillRect(0,0,CW,CH);

  ctx.strokeStyle='rgba(199,125,255,0.055)'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // bricks
  for(const b of bricks){
    if(!b.alive) continue;
    ctx.save();
    ctx.shadowColor=b.cols[0];
    ctx.shadowBlur=b.hp===b.maxHp?10:4;
    const bg=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    const a=b.hp===b.maxHp?'':'99';
    bg.addColorStop(0,b.cols[0]+a); bg.addColorStop(1,b.cols[1]+a);
    ctx.fillStyle=bg; rr(b.x,b.y,b.w,b.h,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.14)'; rr(b.x+2,b.y+2,b.w-4,4,2); ctx.fill();
    if(b.hp<b.maxHp){
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(b.x+b.w*.25,b.y); ctx.lineTo(b.x+b.w*.45,b.y+b.h*.5); ctx.lineTo(b.x+b.w*.65,b.y+b.h);
      ctx.stroke();
    }
    ctx.restore();
  }

  // paddle
  ctx.save();
  ctx.shadowColor='rgba(255,209,102,0.8)'; ctx.shadowBlur=18;
  const pg=ctx.createLinearGradient(pad.x,pad.y,pad.x,pad.y+pad.h);
  pg.addColorStop(0,'#ffd166'); pg.addColorStop(1,'#ff9500');
  ctx.fillStyle=pg; rr(pad.x,pad.y,pad.w,pad.h,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)'; rr(pad.x+4,pad.y+2,pad.w-8,3,2); ctx.fill();
  ctx.restore();

  // ball trail
  for(let i=0;i<ball.trail.length;i++){
    const al=(i/ball.trail.length)*0.28;
    const tr=ball.r*(i/ball.trail.length)*0.65;
    ctx.beginPath(); ctx.arc(ball.trail[i].x,ball.trail[i].y,tr,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,56,100,${al})`; ctx.fill();
  }

  // ball
  ctx.save();
  ctx.shadowColor='#ff3864'; ctx.shadowBlur=22;
  const bg2=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
  bg2.addColorStop(0,'#fff'); bg2.addColorStop(0.4,'#ffd166'); bg2.addColorStop(1,'#ff3864');
  ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowColor=p.col; ctx.shadowBlur=8;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
    p.x+=p.dx; p.y+=p.dy; p.dy+=0.12; p.life-=p.dec;
  }

  // flash on death
  if(flashFrames>0){
    ctx.fillStyle=`rgba(255,56,100,${(flashFrames/25)*0.3})`;
    ctx.fillRect(0,0,CW,CH);
  }

  // launch hint
  if(gameState==='playing' && !ball.live){
    ctx.fillStyle='rgba(255,209,102,0.35)';
    ctx.font='7px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText('CLICK TO LAUNCH',CW/2,CH-12);
  }
}

function update() {
  if(gameState!=='playing') return;
  if(flashFrames>0){ flashFrames--; return; }

  pad.x = Math.max(0, Math.min(CW-pad.w, mouseX-pad.w/2));

  if(!ball.live){
    ball.x=pad.x+pad.w/2; ball.y=pad.y-ball.r-2;
    return;
  }

  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>12) ball.trail.shift();

  ball.x+=ball.dx; ball.y+=ball.dy;

  if(ball.x-ball.r<0){ball.x=ball.r; ball.dx=Math.abs(ball.dx);}
  if(ball.x+ball.r>CW){ball.x=CW-ball.r; ball.dx=-Math.abs(ball.dx);}
  if(ball.y-ball.r<0){ball.y=ball.r; ball.dy=Math.abs(ball.dy);}

  // paddle hit
  if(ball.dy>0 && ball.y+ball.r>=pad.y && ball.y+ball.r<=pad.y+pad.h+6 &&
     ball.x>=pad.x-4 && ball.x<=pad.x+pad.w+4){
    const rel=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
    const s=spd();
    ball.dx=rel*s*1.2;
    ball.dy=-Math.sqrt(Math.max(0.5,s*s-ball.dx*ball.dx));
    ball.y=pad.y-ball.r;
    const mag=Math.hypot(ball.dx,ball.dy), cap=s*1.4;
    if(mag>cap){ball.dx*=cap/mag; ball.dy*=cap/mag;}
  }

  if(ball.y-ball.r>CH){
    lives--; updateHUD(); flashFrames=25;
    if(lives<=0){ gameState='dead'; showOverlay('GAME OVER',`final score: ${score}`,'PLAY AGAIN'); return; }
    resetRound(); return;
  }

  for(const b of bricks){
    if(!b.alive) continue;
    if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w &&
       ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h){
      b.hp--;
      if(b.hp<=0){ b.alive=false; score+=10*level; burst(b.x+b.w/2,b.y+b.h/2,b.cols[0]); updateHUD(); }
      const ol=(ball.x+ball.r)-b.x, or2=(b.x+b.w)-(ball.x-ball.r);
      const ot=(ball.y+ball.r)-b.y, ob=(b.y+b.h)-(ball.y-ball.r);
      if(Math.min(ol,or2)<Math.min(ot,ob)) ball.dx=-ball.dx; else ball.dy=-ball.dy;
      break;
    }
  }

  if(bricks.every(b=>!b.alive)){
    score+=100*level; updateHUD(); level++;
    if(level>4){ gameState='win'; showOverlay('YOU WIN!',`legendary score: ${score}`,'PLAY AGAIN'); }
    else{ flashFrames=30; initBricks(); resetRound(); }
  }
}

function loop() {
  update(); draw();
  if(gameState==='playing' || particles.length>0)
    rafId = requestAnimationFrame(loop);
}

// initial render under overlay
initPad(); initBricks(); initBall(); updateHUD(); draw();
</script>
</body>
</html>
